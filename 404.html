<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Not found — Beastcore Studios</title>
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="theme-color" content="#0f1110">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/assets/site.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body.notfound {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .notfound-inner {
      max-width: 480px;
      text-align: center;
      padding: 0 24px;
    }
    .notfound-inner h1 {
      font-family: "Space Grotesk", Inter, sans-serif;
      font-size: clamp(40px, 6vw, 64px);
      letter-spacing: -0.045em;
      line-height: 1.05;
      margin: 0 0 32px;
    }
    .notfound-inner a {
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 4px;
    }
  </style>
</head>
<body class="notfound">
  <div class="notfound-inner">
    <h1>404 — not found.</h1>
